<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무명: 이름 없는 병사</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="scene">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
          <div class="start-content">
            <p class="start-eyebrow">인터랙티브 텍스트 RPG</p>
            <h1 class="start-title">무명</h1>
            <p class="start-subtitle">이름 없는 병사</p>
            <div class="start-actions">
              <button class="menu-button" id="startGameButton">게임 시작</button>
              <button class="menu-button secondary" id="startLoadButton">불러오기</button>
            </div>
          </div>
        </div>

        <span id="chapterLabel" style="display: none;"></span>
        <section class="story-panel" id="storyPanel" style="display: none;">
          <div class="stats-bar">
            <div class="stats-left">
              <div class="stat-container" data-stat="faith" title="천계에 대한 흔들림 없는 믿음과 규율 준수">
                <span class="stat-label">신앙 <b id="stat-faith">0</b></span>
                <div class="stat-bar-outer"><div class="stat-bar-inner" id="bar-faith" style="width: 0%"></div></div>
              </div>
              <div class="stat-container" data-stat="doubt" title="천계의 진실과 존재적 의미에 대한 깊은 의문">
                <span class="stat-label">의심 <b id="stat-doubt">0</b></span>
                <div class="stat-bar-outer"><div class="stat-bar-inner" id="bar-doubt" style="width: 0%"></div></div>
              </div>
              <div class="stat-container" data-stat="wound" title="신체적 및 정신적 부상. 7에 도달하면 무너집니다.">
                <span class="stat-label">상처 <b id="stat-wound">0</b></span>
                <div class="stat-bar-outer"><div class="stat-bar-inner" id="bar-wound" style="width: 0%"></div></div>
              </div>
              <div class="stat-container" data-stat="memory" title="잃어버린 과거와 전장의 감각을 회상하는 기억력">
                <span class="stat-label">기억 <b id="stat-memory">0</b></span>
                <div class="stat-bar-outer"><div class="stat-bar-inner" id="bar-memory" style="width: 0%"></div></div>
              </div>
            </div>
            <div class="stats-right">
              <button class="icon-button mini" id="soundToggle" title="소리 켜기/끄기" aria-label="소리 토글">
                <span id="soundIcon" aria-hidden="true">🔊</span>
              </button>
              <button class="icon-button mini" id="logOpenButton" title="이전 스토리 로그" aria-label="로그 보기">
                <span aria-hidden="true">📋</span>
              </button>
              <button class="icon-button mini" id="loadButton" title="불러오기" aria-label="불러오기">
                <span aria-hidden="true">↺</span>
              </button>
              <button class="icon-button danger mini" id="resetButton" title="처음부터" aria-label="처음부터">
                <span aria-hidden="true">×</span>
              </button>
            </div>
          </div>
          <div class="clues-bar" id="cluesBar">
            <span class="clues-label">발견된 단서:</span>
            <span id="cluesList"></span>
          </div>
          <p class="location" id="locationText">백은 요새</p>
          <h2 id="eventTitle">백은 요새의 새벽</h2>
          <div class="story-text" id="storyText"></div>
          <div class="choices" id="choices"></div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="confirmDialog" hidden>
      <section class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <p class="confirm-eyebrow">확인</p>
        <h2 id="confirmTitle">확인</h2>
        <p id="confirmMessage"></p>
        <div class="dialog-actions">
          <button class="dialog-button secondary" id="confirmCancel" type="button">취소</button>
          <button class="dialog-button primary" id="confirmOk" type="button">확인</button>
        </div>
      </section>
    </div>

    <!-- Story Log Modal -->
    <div class="modal-backdrop" id="logModal" hidden>
      <section class="confirm-box log-box" role="dialog" aria-modal="true" aria-labelledby="logTitle">
        <p class="confirm-eyebrow">기록</p>
        <h2 id="logTitle">지나간 기억</h2>
        <div class="log-content" id="logContent">
          <!-- Logs dynamic fill -->
        </div>
        <div class="dialog-actions">
          <button class="dialog-button primary" id="logClose" type="button">닫기</button>
        </div>
      </section>
    </div>

    <!-- Dice Roll / Check Overlay -->
    <div class="modal-backdrop" id="checkModal" hidden>
      <section class="confirm-box check-box" role="dialog" aria-modal="true" aria-labelledby="checkTitle">
        <p class="confirm-eyebrow" id="checkEyebrow">스탯 판정</p>
        <h2 id="checkTitle">판정 진행 중</h2>
        <div class="check-container">
          <div class="check-animation">
            <div class="check-dice" id="checkDice">?</div>
          </div>
          <p id="checkDetail"></p>
          <p id="checkResult" class="check-result-text"></p>
        </div>
        <div class="dialog-actions">
          <button class="dialog-button primary" id="checkProceed" type="button" disabled>진행하기</button>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./act1.js"></script>
    <script src="./act2.js"></script>
    <script src="./act3.js"></script>
    <script src="./act4.js"></script>
    <script src="./act5.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
