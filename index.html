<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무명</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="scene">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="chapterLabel">1막 천계</p>
            <h1>무명</h1>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="saveButton" title="저장" aria-label="저장">
              <span aria-hidden="true">▣</span>
            </button>
            <button class="icon-button" id="loadButton" title="불러오기" aria-label="불러오기">
              <span aria-hidden="true">↺</span>
            </button>
            <button class="icon-button danger" id="resetButton" title="처음부터" aria-label="처음부터">
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </header>

        <section class="story-panel">
          <p class="location" id="locationText">백은 요새</p>
          <h2 id="eventTitle">백은 요새의 새벽</h2>
          <div class="story-text" id="storyText"></div>
          <div class="choices" id="choices"></div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="confirmDialog" hidden>
      <section class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <h2 id="confirmTitle">확인</h2>
        <p id="confirmMessage"></p>
        <div class="dialog-actions">
          <button class="dialog-button secondary" id="confirmCancel" type="button">취소</button>
          <button class="dialog-button primary" id="confirmOk" type="button">확인</button>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./game.js?v=20260618"></script>
  </body>
</html>
